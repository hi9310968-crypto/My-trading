<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intraday Multi-Parameter Verification System</title>
<style>
:root {
--bg-color: #0f172a;
--card-bg: #1e293b;
--text-color: #f8fafc;
--text-muted: #94a3b8;
--primary: #3b82f6;
--success: #22c55e;
--warning: #eab308;
--danger: #ef4444;
--border: #334155;
}

body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background-color: var(--bg-color);
color: var(--text-color);
margin: 0;
padding: 15px;
display: flex;
justify-content: center;
}

.container {
width: 100%;
max-width: 600px;
background: var(--card-bg);
border-radius: 12px;
padding: 20px;
box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
border: 1px solid var(--border);
}

h2 {
text-align: center;
margin-top: 0;
font-size: 1.4rem;
color: var(--text-color);
}

.subtitle {
text-align: center;
color: var(--text-muted);
font-size: 0.85rem;
margin-top: -10px;
margin-bottom: 20px;
}

.tabs {
display: flex;
background: #0f172a;
padding: 4px;
border-radius: 8px;
margin-bottom: 20px;
}

.tab-btn {
flex: 1;
padding: 10px;
background: transparent;
border: none;
color: var(--text-muted);
font-weight: bold;
cursor: pointer;
border-radius: 6px;
transition: 0.2s;
font-size: 0.95rem;
}

.tab-btn.active {
background: var(--primary);
color: white;
}

.dropdown-group {
margin-bottom: 15px;
}

label {
display: block;
margin-bottom: 6px;
font-size: 0.85rem;
color: var(--text-muted);
font-weight: 500;
}

select {
width: 100%;
padding: 10px;
background: #0f172a;
border: 1px solid var(--border);
color: var(--text-color);
border-radius: 6px;
font-size: 0.9rem;
outline: none;
box-sizing: border-box;
}

select:focus {
border-color: var(--primary);
}

.result-panel {
margin-top: 25px;
background: #0f172a;
border-radius: 8px;
padding: 15px;
text-align: center;
border: 1px solid var(--border);
}

.result-title {
font-size: 0.85rem;
color: var(--text-muted);
text-transform: uppercase;
letter-spacing: 0.5px;
}

.action-badge {
font-size: 1.8rem;
font-weight: 800;
margin: 10px 0;
color: var(--text-muted);
}

.probability-text {
font-size: 1.1rem;
font-weight: 600;
}

.strong-buy { color: var(--success); }
.buy { color: #4ade80; }
.wait { color: var(--warning); }
.no-buy { color: var(--danger); }
</style>
</head>
<body>

<div class="container">
<h2>Verification System App</h2>
<div class="subtitle">15-Min Intraday Strategy Checklist</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchMode('TEZI')">Tezi (Call Buy)</button>
<button class="tab-btn" onclick="switchMode('MANDI')">Mandi (Put Buy)</button>
</div>

<div id="selectors-container">
<!-- Dynamic dropdowns built by JS -->
