<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trading Signal App</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #3b82f6; --success: #22c55e; --danger: #ef4444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 5px; font-size: 20px; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 13px; }
        .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; background: #0f172a; padding: 15px; border-radius: 10px; }
        .param-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; color: #94a3b8; font-weight: bold; }
        input { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 5px; font-size: 14px; width: 85%; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #263449; }
        
        .signal-box { background: #0f172a; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 2px dashed #334155; }
        #signalText { font-size: 22px; font-weight: bold; color: #94a3b8; }
        .signal-call { color: var(--success) !important; border-color: var(--success) !important; }
        .signal-put { color: var(--danger) !important; border-color: var(--danger) !important; }

        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: var(--primary); font-size: 16px; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #0f172a; border-radius: 8px; overflow: hidden; display: none; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: center; font-size: 13px; }
        th { background: #334155; color: #94a3b8; }
        .strong-buy { color: #22c55e; font-weight: bold; }
        .buy { color: #4ade80; }
        .wait { color: #fbbf24; }
        .no-buy { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h2>Smart Verifier System</h2>
    <div class="subtitle">Enter Values to Get Automatic Signal</div>
    
    <div class="params-grid">
        <div class="param-item"><label>Delta</label><input type="number" id="delta" placeholder="0.50"></div>
        <div class="param-item"><label>PCR (Put-Call Ratio)</label><input type="number" id="pcr" step="0.01" placeholder="1.2"></div>
        <div class="param-item"><label>RSI</label><input type="number" id="rsi" placeholder="60"></div>
        <div class="param-item"><label>IV</label><input type="number" id="iv" placeholder="15"></div>
