<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Signal Verifier</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #22c55e; --danger: #ef4444; --warning: #fbbf24; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .main-container { display: flex; flex-wrap: wrap; gap: 15px; max-width: 900px; margin: auto; }
        .box { flex: 1; min-width: 320px; background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        h3 { text-align: center; color: #3b82f6; margin-top: 0; }
        .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; }
        input { padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; font-size: 14px; }
        
        .result-box { text-align: center; padding: 20px; border-radius: 10px; background: #0f172a; border: 2px solid #334155; margin-bottom: 20px; }
        #decision { font-size: 24px; font-weight: bold; }
        #probability { font-size: 16px; margin-top: 10px; }
        
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        .strategy-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        .strategy-table th, .strategy-table td { border: 1px solid #334155; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="box">
        <h3>Live Market Input</h3>
        <div class="params-grid">
            <div class="input-group"><label>PCR (Ratio)</label><input type="number" id="pcr" step="0.01" placeholder="1.1"></div>
            <div class="input-group"><label>RSI (15-Min)</label><input type="number" id="rsi" placeholder="60"></div>
            <div class="input-group"><label>IV (Implied Vol)</label><input type="number" id="iv" placeholder="18"></div>
            <div class="input-group"><label>OI Change %</label><input type="number" id="oi" placeholder="20"></div>
            <div class="input-group"><label>DELTA</label><input type="number" id="delta" step="0.01" placeholder="0.5"></div>
            <div class="input-group"><label>VIX</label><input type="number" id="vix" placeholder="14"></div>
            <div class="input-group"><label>GAMMA</label><input type="number" id="gamma" step="0.001" placeholder="0.002"></div>
            <div class="input-group"><label>THETA</label><input type="number" id="theta" placeholder="-12"></div>
        </div>
        <button onclick="checkTrade()">CHECK LIVE SIGNAL</button>
    </div>

    <div class="box">
        <h3>Final Decision</h3>
        <div class="result-box" id="signalBox">
            <div id="decision">WAITING...</div>
            <div id="probability">Win Prob: --%</div>
        </div>
        
        <table class="strategy-table">
            <thead><tr><th>Win %</th><th>Action</th><th>Condition</th></tr></thead>
            <tbody>
                <tr style="color:var(--success)"><td>100-95%</td><td>STRONG BUY</td><td>PCR > 1.2 & RSI > 65</td></tr>
                <tr style="color:var(--warning)"><td>70%</td><td>WAIT</td><td>Side-ways Trend</td></tr>
                <tr style="color:var(--danger)"><td>10%</td><td>NO BUY</td><td>Risk of Loss</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    function checkTrade() {
        const pcr = parseFloat(document.getElementById('pcr').value);
        const rsi = parseFloat(document.getElementById('rsi').value);
        const iv = parseFloat(document.getElementById('iv').value);
        const oi = parseFloat(document.getElementById('oi').value);
        
        const dText = document.getElementById('decision');
        const pText = document.getElementById('probability');
        const sBox = document.getElementById('signalBox');

        if (isNaN(pcr) || isNaN(rsi)) {
            alert("PCR aur RSI daalna zaroori hai!");
            return;
        }

        // Logic for Buy Call/Put or No Trade
        if (pcr >= 1.15 && rsi >= 60 && oi > 10) {
            dText.innerText = "BUY CALL (Tezi)";
            dText.style.color = "var(--success)";
            pText.innerText = "Winning Probability: 95%";
            sBox.style.borderColor = "var(--success)";
        } else if (pcr <= 0.85 && rsi <= 40 && oi > 10) {
            dText.innerText = "BUY PUT (Mandi)";
            dText.style.color = "var(--danger)";
            pText.innerText = "Winning Probability: 90%";
            sBox.style.borderColor = "var(--danger)";
        } else {
            dText.innerText = "WAIT (No Trade)";
            dText.style.color = "var(--warning)";
            pText.innerText = "Loss Risk: HIGH (Trend weak)";
            sBox.style.borderColor = "var(--warning)";
        }
    }
</script>
</body>
</html>
